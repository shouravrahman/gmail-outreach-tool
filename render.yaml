services:
  - type: web
    name: bulk-email-tool
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./scripts/run_prod.sh
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MASTER_KEY
        sync: false
      - key: GOOGLE_CLIENT_JSON
        sync: false
      - key: DATABASE_URL
        sync: false
