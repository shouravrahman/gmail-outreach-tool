# Copy this to ~/.streamlit/secrets.toml and fill in your values
# On Streamlit Cloud, set these under "Secrets" in Advanced Settings

# ============================================================================
# DATABASE (NeonDB PostgreSQL)
# ============================================================================
# Get from: https://console.neon.tech/app/projects
# Connection format: postgresql://user:password@host/database?sslmode=require
DATABASE_URL = "postgresql://user:password@ep-xyz.us-east-4.aws.neon.tech/bulk_email?sslmode=require"

# ============================================================================
# SECURITY & SECRETS
# ============================================================================
MASTER_KEY = "your-random-32-char-secure-key-here"
ENCRYPTION_SALT = "your-random-salt-here"
JWT_SECRET = "your-random-jwt-secret-here"

# ============================================================================
# EMAIL INTEGRATIONS (Optional)
# ============================================================================
# GMAIL_CREDENTIALS_PATH = "/path/to/credentials.json"
RESEND_API_KEY = "re_xxxxx"

# ============================================================================
# AI INTEGRATIONS (Optional)
# ============================================================================
# OPENAI_API_KEY = "sk-..."
# GOOGLE_AI_API_KEY = "AIza..."

# ============================================================================
# TELEGRAM BOT (Optional - for error notifications)
# ============================================================================
# TELEGRAM_BOT_TOKEN = "123456:ABC..."
# TELEGRAM_CHAT_ID = "123456789"
